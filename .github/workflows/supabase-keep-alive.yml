name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # Runs every 3 days at midnight
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -X GET "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/users?select=id&limit=1" \
          -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
